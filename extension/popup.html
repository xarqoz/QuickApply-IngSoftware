<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuickApply Autocompletar</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 0; padding: 16px; width: 320px; }
      button { width: 100%; padding: 12px; border: none; border-radius: 10px; background: #6366f1; color: white; font-weight: 600; cursor: pointer; }
      button:hover { opacity: 0.9; }
      .note { margin-top: 12px; color: #4b5563; font-size: 0.95rem; }
    </style>
  </head>
  <body>
    <h1>QuickApply</h1>
    <div style="margin: 16px 0;">
      <label for="user-id" style="display:block; margin-bottom:8px; font-size:0.95rem; color:#374151;">Usuario ID</label>
      <input id="user-id" type="text" placeholder="Tu userId" style="width:100%; padding:10px; border:1px solid #d1d5db; border-radius:8px; margin-bottom:10px;" />
      <button id="save-id-btn" style="background:#10b981; margin-bottom:10px;">Guardar ID</button>
    </div>
    <button id="fill-btn">Autocompletar formulario</button>
    <p class="note">Asegúrate de que el backend esté en <code>http://localhost:3000</code> y de haber iniciado sesión en la app.</p>
    <script src="popup.js"></script>
  </body>
</html>
