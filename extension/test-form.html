<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Formulario de prueba QuickApply</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 720px;
      margin: 40px auto;
      padding: 0 20px;
    }
    h1 {
      color: #0f172a;
    }
    form {
      display: grid;
      gap: 16px;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
    }
    input, textarea, select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 1rem;
    }
    button {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 18px;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover {
      opacity: 0.95;
    }
    .hint {
      color: #475569;
      margin-top: 0;
    }
  </style>
</head>
<body>
  <h1>Formulario de prueba QuickApply</h1>
  <p class="hint">Usa la extensión para autocompletar estos campos con tu perfil.</p>
  <form>
    <div>
      <label for="fullName">Nombre completo</label>
      <input id="fullName" name="fullName" placeholder="Tu nombre completo" />
    </div>
    <div>
      <label for="email">Correo electrónico</label>
      <input id="email" name="email" type="email" placeholder="usuario@correo.com" />
    </div>
    <div>
      <label for="phone">Teléfono</label>
      <input id="phone" name="phone" type="tel" placeholder="Ej. +34 600 000 000" />
    </div>
    <div>
      <label for="location">Dirección / Ciudad</label>
      <input id="location" name="location" placeholder="Ciudad, País" />
    </div>
    <div>
      <label for="linkedin">LinkedIn</label>
      <input id="linkedin" name="linkedin" placeholder="https://linkedin.com/in/usuario" />
    </div>
    <div>
      <label for="portfolio">Portafolio / Sitio web</label>
      <input id="portfolio" name="portfolio" placeholder="https://tusitio.com" />
    </div>
    <div>
      <label for="about">Sobre mí</label>
      <textarea id="about" name="about" rows="4" placeholder="Describe tus habilidades..."></textarea>
    </div>
    <div>
      <label for="jobType">Tipo de puesto</label>
      <select id="jobType" name="jobType">
        <option value="">Selecciona...</option>
        <option value="frontend">Frontend</option>
        <option value="backend">Backend</option>
        <option value="fullstack">Fullstack</option>
      </select>
    </div>
    <button type="button">Enviar</button>
  </form>
</body>
</html>
